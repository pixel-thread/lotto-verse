name: EAS Trigger deployment to preview

on:
  push:
    branches: ['uat']

jobs:
  notify_start:
    name: Notify preview deployment start
    type: slack
    params:
      webhook_url: ${{ env.SLACK_WEBHOOK_URL }}
      message: |
        🚀 Preview deployment started
        Branch: uat
        Platform: android
        Commit: ${{ github.event.head_commit.message }}

  fingerprint:
    name: Fingerprint
    needs: [notify_start]
    type: fingerprint
    environment: preview

  get_android_build:
    name: Check for existing android build
    needs: [fingerprint]
    type: get_build
    params:
      fingerprint_hash: ${{ needs.fingerprint.outputs.android_fingerprint_hash }}
      profile: preview

  build_android:
    name: Build Android
    needs: [get_android_build]
    if: ${{ !needs.get_android_build.outputs.build_id }}
    type: build
    params:
      platform: android
      profile: preview

  publish_android_update:
    name: Publish Android update
    needs: [get_android_build]
    if: ${{ needs.get_android_build.outputs.build_id }}
    type: update
    params:
      branch: preview
      platform: android

  notify_failure:
    name: Notify preview failure
    after: [fingerprint, get_android_build, build_android, publish_android_update]
    if: ${{ failure() }}
    type: slack
    params:
      webhook_url: ${{ env.SLACK_WEBHOOK_URL }}
      message: |
        ❌ Preview deployment failed
        Fingerprint status: ${{ needs.fingerprint.status }}
        get_android_build status: ${{ needs.get_android_build.status }}
        build_android status: ${{ needs.build_android.status }}
        publish_android_update status: ${{ needs.publish_android_update.status }}

  notify_success:
    name: Notify preview success
    needs: [build_android, publish_android_update]
    if: ${{ success() }}
    type: slack
    params:
      webhook_url: ${{ env.SLACK_WEBHOOK_URL }}
      message: |
        ✅ Preview deployment completed
        Used existing build: ${{ needs.get_android_build.outputs.build_id }}
        New build ID (if created): ${{ needs.build_android.outputs.build_id }}
        Branch: preview
        Platform: android
